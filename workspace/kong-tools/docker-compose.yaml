services:
  devportal:
    image: veecode/devportal:latest
    ports:
      - "7007:7007"
    environment:
      - DEVELOPMENT=true
      - LOG_LEVEL=info
    volumes:
      - ./app-config.dynamic.yaml:/app/app-config.local.yaml:ro
      - ./examples:/app/examples:ro
      - ./dynamic-plugins.yaml:/app/dynamic-plugins.yaml:ro
      # mounting dist-dynamic directly, no need to npm publish
      - ./plugins/kong-service-manager-backend/dist-dynamic:/app/dynamic-plugins/dist/veecode-platform-backstage-plugin-kong-service-manager-backend-dynamic:ro
      - ./plugins/kong-service-manager/dist-dynamic:/app/dynamic-plugins/dist/veecode-platform-backstage-plugin-kong-service-manager-dynamic:ro
      - ./plugins/scaffolder-field-extensions-kong/dist-dynamic:/app/dynamic-plugins/dist/veecode-platform-backstage-plugin-scaffolder-field-extensions-kong-dynamic:ro
    extra_hosts:
      - "manager.localdomain:host-gateway"
