name: Publish Plugins

on:
  workflow_dispatch:
    inputs:
      config:
        description: 'JSON map of workspace:bump (e.g. {"about":"patch","homepage":"minor"})'
        required: true
        type: string

env:
  NODE_VERSION: '22'

jobs:
  parse:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.parse.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: workspace
          sparse-checkout-cone-mode: true

      - name: Validate workspace names
        env:
          CONFIG: ${{ inputs.config }}
        run: |
          INVALID=""
          for WS in $(echo "$CONFIG" | jq -r 'keys[]'); do
            if [ ! -d "workspace/$WS" ]; then
              INVALID="$INVALID $WS"
            fi
          done
          if [ -n "$INVALID" ]; then
            echo "::error::Invalid workspace name(s):$INVALID"
            echo "Valid workspaces are:"
            ls workspace/
            exit 1
          fi

      - id: parse
        env:
          CONFIG: ${{ inputs.config }}
        run: |
          MATRIX=$(echo "$CONFIG" | jq -c '[to_entries[] | {workspace: .key, bump: .value}]')
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "Publishing: $MATRIX"

  publish:
    needs: parse
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      id-token: write
      contents: read
    strategy:
      matrix:
        include: ${{ fromJson(needs.parse.outputs.matrix) }}
      fail-fast: false
    defaults:
      run:
        working-directory: workspace/${{ matrix.workspace }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'

      - name: Enable Corepack
        run: npm i -g corepack && corepack enable

      - name: Compute new version
        id: version
        env:
          BUMP: ${{ matrix.bump }}
        run: |
          CURRENT=$(sed -n 's/^VERSION[[:space:]]*?=[[:space:]]*\([^ #]*\).*/\1/p' Makefile)
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"

          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)

          case "$BUMP" in
            patch) PATCH=$((PATCH + 1)) ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
          esac

          NEW="$MAJOR.$MINOR.$PATCH"
          echo "new=$NEW" >> "$GITHUB_OUTPUT"
          echo "Version: $CURRENT → $NEW ($BUMP)"

      - name: Set version
        run: make set-version VERSION=${{ steps.version.outputs.new }}

      - name: Publish static plugins
        run: make publish VERSION=${{ steps.version.outputs.new }}

      - name: Publish dynamic plugins
        continue-on-error: true
        run: make publish-dynamic VERSION=${{ steps.version.outputs.new }}

      - name: Restore workspace references
        if: always()
        run: make restore-workspace 2>/dev/null || true

      - name: Record successful publish
        env:
          WS: ${{ matrix.workspace }}
          NEW_VERSION: ${{ steps.version.outputs.new }}
        run: |
          mkdir -p /tmp/publish-results
          echo "$NEW_VERSION" > "/tmp/publish-results/$WS"

      - name: Upload publish result
        uses: actions/upload-artifact@v4
        with:
          name: published-${{ matrix.workspace }}
          path: /tmp/publish-results/${{ matrix.workspace }}

      - name: Report
        if: always()
        run: |
          echo "### ${{ matrix.workspace }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Version: ${{ steps.version.outputs.current }} → ${{ steps.version.outputs.new }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Bump: ${{ matrix.bump }}" >> "$GITHUB_STEP_SUMMARY"

  commit-versions:
    if: always() && needs.publish.result != 'cancelled'
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download publish results
        uses: actions/download-artifact@v4
        with:
          pattern: published-*
          path: /tmp/published
          merge-multiple: true

      - name: Check for successful publishes
        id: check
        run: |
          if [ -d /tmp/published ] && [ "$(ls -A /tmp/published 2>/dev/null)" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "Successfully published: $(ls /tmp/published | tr '\n' ', ' | sed 's/,$//')"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No workspaces were published successfully — skipping commit"
          fi

      - name: Configure git
        if: steps.check.outputs.found == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Update Makefile versions on main
        if: steps.check.outputs.found == 'true'
        run: |
          for WS_FILE in /tmp/published/*; do
            WS=$(basename "$WS_FILE")
            NEW=$(cat "$WS_FILE")
            MAKEFILE="workspace/$WS/Makefile"
            [ -f "$MAKEFILE" ] || continue
            CURRENT=$(sed -n 's/^VERSION[[:space:]]*?=[[:space:]]*\([^ #]*\).*/\1/p' "$MAKEFILE")
            sed -i "s/^VERSION[[:space:]]*?=.*/VERSION ?= $NEW/" "$MAKEFILE"
            echo "Updated $MAKEFILE: $CURRENT → $NEW"
          done

      - name: Commit version bumps
        if: steps.check.outputs.found == 'true'
        run: |
          git add workspace/*/Makefile
          if git diff --cached --quiet; then
            echo "No version changes to commit"
          else
            WORKSPACES=$(ls /tmp/published | tr '\n' ',' | sed 's/,$//')
            git commit -m "chore: bump versions after publish ($WORKSPACES)"
            git push origin main
          fi
